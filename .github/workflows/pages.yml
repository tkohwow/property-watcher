name: Publish Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'property_watcher/pages.py'
      - 'property_watcher/web.py'
      - 'property_watcher.db'
      - 'property_images/**'
      - '.github/workflows/pages.yml'
  workflow_run:
    workflows:
      - Watch properties
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export static site
        run: python -m property_watcher.pages --db property_watcher.db --image-dir property_images --out site

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
