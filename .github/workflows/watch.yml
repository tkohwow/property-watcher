name: Watch properties

on:
  workflow_dispatch:
    inputs:
      image_mode:
        description: '室内写真の保存方法'
        required: true
        default: 'initial'
        type: choice
        options:
          - initial
          - refresh
          - 'off'
  schedule:
    # JST 9:15
    - cron: '15 0 * * *'

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover new property candidates
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python -m property_watcher.discover --csv properties.csv --db property_watcher.db --auto-add --notify

      - name: Run watcher
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python -m property_watcher.run --csv properties.csv --db property_watcher.db --images "${{ inputs.image_mode || 'initial' }}"

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add properties.csv
          git add -f property_watcher.db
          if [ -d property_images ]; then
            git add property_images
          fi
          if git diff --cached --quiet; then
            echo "No database changes"
          else
            git commit -m "update property watcher database"
            git push
          fi
