name: Watch properties

on:
  workflow_dispatch:
  schedule:
    # JST 9:15
    - cron: '15 0 * * *'

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt



      - name: Send test email
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.mime.text import MIMEText

          gmail_user = os.environ["GMAIL_USER"]
          gmail_app_password = os.environ["GMAIL_APP_PASSWORD"]
          notify_to = os.environ["NOTIFY_TO"]

          msg = MIMEText("property-watcher のGmail通知テストです。", "plain", "utf-8")
          msg["Subject"] = "property-watcher test"
          msg["From"] = gmail_user
          msg["To"] = notify_to

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(gmail_user, gmail_app_password)
              server.send_message(msg)

          print("Test email sent")
          PY
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}






      - name: Run watcher
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python -m property_watcher.run --csv properties.csv --db property_watcher.db

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f property_watcher.db
          if git diff --cached --quiet; then
            echo "No database changes"
          else
            git commit -m "update property watcher database"
            git push
          fi
